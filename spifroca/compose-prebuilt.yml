services:

  db:
    image: postgres:16-alpine
    container_name: spifroca_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: spifroca
      POSTGRES_PASSWORD: spifroca_secret_2024
      POSTGRES_DB: spifroca
    volumes:
      - spifroca_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spifroca"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    image: spifroca-app:latest
    container_name: spifroca_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://spifroca:spifroca_secret_2024@db:5432/spifroca
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: SpiderfrogSpifroca2024SuperGeheim!!
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      db:
        condition: service_healthy

volumes:
  spifroca_db_data:
