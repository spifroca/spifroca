Devised simplified Docker solution optimized for Synology deployment








Das Problem ist, dass Synology versucht die App direkt zu bauen (kompilieren) — das schlägt auf NAS-Hardware meistens fehl wegen zu wenig RAM oder Timeout. Die Lösung: Wir bauen das Image lokal auf dem PC und laden es fertig auf das NAS.

