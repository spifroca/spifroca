Orchestrierte Schritt-für-Schritt-Anleitung für Synology-Container-Deployment
Orchestrierte Schritt-für-Schritt-Anleitung für Synology-Container-Deployment

Gerne! Hier ist die komplette Schritt-für-Schritt Anleitung für Synology Container Manager:

🖥️ Voraussetzungen
Synology NAS mit DSM 7.2+
Container Manager installiert (Package Center)
Mindestens 4 GB RAM auf dem NAS
Zugriff auf die Synology via Browser
📁 Schritt 1 — Dateien auf das NAS kopieren
Via File Station oder Windows Explorer / Mac Finder:

Öffne die File Station im DSM
Gehe zu docker/ (falls nicht vorhanden, erstellen)
Erstelle einen neuen Ordner: docker/spifroca
Entpacke das ZIP auf deinem PC und lade den gesamten Inhalt in docker/spifroca hoch
Die Struktur sollte so aussehen:

/volume1/docker/spifroca/
├── src/
├── prisma/
├── public/
├── docker-compose.yml
├── Dockerfile
├── Dockerfile.dev
├── package.json
├── .env.example
└── ...
⚙️ Schritt 2 — .env Datei erstellen
In der File Station: docker/spifroca/ öffnen
Erstelle eine neue Datei namens .env
Inhalt (anpassen!):
env
POSTGRES_USER=spifroca
POSTGRES_PASSWORD=spifroca_sicher_2024
POSTGRES_DB=spifroca

DATABASE_URL=postgresql://spifroca:spifroca_sicher_2024@db:5432/spifroca

NEXTAUTH_URL=http://DEINE-NAS-IP:3000
NEXTAUTH_SECRET=ein_langer_geheimer_string_mindestens_32_zeichen
```

> ⚠️ `DEINE-NAS-IP` ersetzen z.B. `http://192.168.1.100:3000`
> ⚠️ `NEXTAUTH_SECRET` — generiere einen sicheren Wert: einfach 32+ zufällige Zeichen eingeben

---

## 🐳 Schritt 3 — Container Manager öffnen

1. DSM → **Container Manager** öffnen
2. Links auf **„Project"** klicken
3. Oben rechts **„Create"** klicken

---

## 🔧 Schritt 4 — Projekt einrichten

Im „Create Project" Dialog:

| Feld | Wert |
|---|---|
| **Project Name** | `spifroca` |
| **Path** | `/docker/spifroca` (den Ordner auswählen) |
| **Source** | „Use existing docker-compose.yml" |

4. Klicke auf **„Next"**
5. Der Container Manager liest die `docker-compose.yml` automatisch ein
6. Klicke auf **„Next"** → **„Done"**

---

## 🚀 Schritt 5 — Images bauen & starten

Container Manager baut jetzt automatisch die Images. Das dauert beim **ersten Mal 5–10 Minuten** (Next.js Build).

Du siehst den Fortschritt im Log-Fenster. Warte bis alle Container grün sind:
```
✅ provis_db      — running
✅ provis_app     — running
🗄️ Schritt 6 — Datenbank initialisieren
Nach dem ersten Start müssen die Tabellen erstellt und Demo-Daten geladen werden:

Container Manager → Container → provis_app auswählen
Oben auf „Terminal" klicken → „Create" → bash
Diese Befehle eingeben:
bash
# Datenbank-Tabellen erstellen
npx prisma migrate deploy

# Demo-Daten laden
npm run db:seed
```

✅ Fertig! Du siehst die Bestätigung mit den Demo-Zugängen.

---

## 🌐 Schritt 7 — App öffnen

Im Browser aufrufen:
```
http://192.168.1.100:3000
(IP deines NAS einsetzen)

Login mit:

admin@provis.ch / Admin123!
🔒 Bonus: Von aussen erreichbar machen (optional)
Falls du die App auch ausserhalb deines Heimnetzwerks nutzen möchtest:

Option A — Synology DDNS + Reverse Proxy:

DSM → Systemsteuerung → Externer Zugriff → DDNS einrichten (z.B. meinname.synology.me)
DSM → Systemsteuerung → Anmeldungsportal → Erweitert → Reverse Proxy
Neue Regel:
Quelle: https://spifroca.meinname.synology.me (Port 443)
Ziel: http://localhost:3000
.env updaten: NEXTAUTH_URL=https://spifroca.meinname.synology.me
Option B — Synology VPN: Nur via VPN erreichbar — sicherer für interne Tools.

🛠️ Häufige Probleme
Problem	Lösung
Port 3000 belegt	In docker-compose.yml → "3001:3000" ändern
App startet nicht	Container Manager → Log des provis_app prüfen
DB Verbindungsfehler	Warten bis provis_db vollständig gestartet ist, dann App neu starten
Build schlägt fehl	RAM prüfen — mind. 2 GB frei nötig
Hast du Fragen zu einem bestimmten Schritt oder brauchst du Hilfe beim Reverse Proxy / HTTPS Setup?

