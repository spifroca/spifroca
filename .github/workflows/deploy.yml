Neues ZIP ist bereit. Hier die zwei Wege je nach deiner Situation:

✅ Weg A — Du hast Docker Desktop auf dem PC (empfohlen)
Das Image lokal bauen und fertig aufs NAS laden. Kein Build auf dem NAS nötig.

1. Im Terminal (im spifroca/ Ordner):

bash
# Image bauen
docker build -f Dockerfile.synology -t spifroca-app:latest .

# Als Datei exportieren
docker save spifroca-app:latest | gzip > spifroca-app-image.tar.gz
(oder einfach build-and-export.sh ausführen)

2. spifroca-app-image.tar.gz auf NAS kopieren → nach /docker/spifroca/

3. Synology Container Manager → „Image" → „Add" → „Import from file" → Datei auswählen

4. compose.yml ersetzen durch compose-prebuilt.yml (umbenennen zu compose.yml)

5. Container Manager → Project → Create → jetzt klappt es ✅

✅ Weg B — Kein Docker auf PC
Dann bauen wir das direkt auf dem NAS via SSH:

1. SSH auf NAS aktivieren: DSM → Systemsteuerung → Terminal → SSH aktivieren

