bash
ssh admin@192.168.1.100
3. In den Ordner navigieren:

bash
cd /volume1/docker/spifroca
4. Image manuell bauen:

bash
sudo docker build -f Dockerfile.synology -t spifroca-app:latest .
(Dauert 10–15 Min., aber funktioniert zuverlässig)

5. Danach: compose.yml → compose-prebuilt.yml umbenennen zu compose.yml, dann Container Manager → Project → Create

